<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .summary-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .expenses-section {
            margin-top: 30px;
        }

        .expense-item {
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .expense-info {
            flex: 1;
        }

        .expense-category {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .expense-date {
            font-size: 13px;
            color: #999;
        }

        .expense-amount {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
            margin-right: 15px;
        }

        .btn-delete {
            background: #dc3545;
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .category-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 10px;
        }

        .expense-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Expense Tracker</h1>

        <div class="summary">
            <div class="total-amount" id="totalAmount">$0.00</div>
            <div class="summary-label">Total Expenses</div>
        </div>

        <div class="form-section">
            <h2 style="margin-bottom: 15px; color: #333; font-size: 18px;">Add New Expense</h2>
            <div class="form-group">
                <label for="amount">Amount ($) *</label>
                <input type="number" id="amount" placeholder="Enter amount" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" required>
                    <option value="">Select category</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Health">Health</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date">
            </div>
            <button onclick="addExpense()">Add Expense</button>
        </div>

        <div class="expenses-section">
            <h2 style="margin-bottom: 15px; color: #333; font-size: 18px;">Expense History</h2>
            <div id="expensesList"></div>
        </div>
    </div>

    <script>
        const API_URL = '/expenses';

        // Load expenses on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadExpenses();
            // Set today's date as default
            document.getElementById('date').valueAsDate = new Date();
        });

        async function loadExpenses() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                displayExpenses(data.expenses, data.total);
            } catch (error) {
                console.error('Error loading expenses:', error);
            }
        }

        function displayExpenses(expenses, total) {
            document.getElementById('totalAmount').textContent = `$${total.toFixed(2)}`;
            const expensesList = document.getElementById('expensesList');

            if (expenses.length === 0) {
                expensesList.innerHTML = '<div class="empty-state">No expenses yet. Start tracking today!</div>';
                return;
            }

            expensesList.innerHTML = expenses.map(expense => `
                <div class="expense-item">
                    <div class="expense-info">
                        <div class="expense-category">
                            <span class="category-badge">${expense.category}</span>
                            ${expense.category}
                        </div>
                        <div class="expense-date">
                            ${new Date(expense.date).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="expense-actions">
                        <div class="expense-amount">$${expense.amount.toFixed(2)}</div>
                        <button class="btn-delete" onclick="deleteExpense('${expense._id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function addExpense() {
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const date = document.getElementById('date').value;

            if (!amount || !category) {
                alert('Please fill in all required fields');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        amount: parseFloat(amount),
                        category,
                        date: date ? new Date(date) : new Date()
                    })
                });

                if (response.ok) {
                    document.getElementById('amount').value = '';
                    document.getElementById('category').value = '';
                    document.getElementById('date').valueAsDate = new Date();
                    loadExpenses();
                    alert('Expense added successfully!');
                }
            } catch (error) {
                console.error('Error adding expense:', error);
            }
        }

        async function deleteExpense(id) {
            if (confirm('Are you sure you want to delete this expense?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        loadExpenses();
                    }
                } catch (error) {
                    console.error('Error deleting expense:', error);
                }
            }
        }
    </script>
</body>
</html>
