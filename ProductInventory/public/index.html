<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .products-section {
            margin-top: 30px;
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .product-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .product-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .product-table tr:hover {
            background: #f9f9f9;
        }

        .product-name {
            font-weight: 600;
            color: #333;
        }

        .price {
            color: #667eea;
            font-weight: 600;
        }

        .quantity-input {
            width: 80px;
            padding: 5px;
        }

        .btn-update {
            background: #28a745;
            padding: 5px 10px;
            font-size: 12px;
            margin-right: 5px;
        }

        .btn-update:hover {
            background: #218838;
        }

        .btn-delete {
            background: #dc3545;
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .low-stock {
            background: #fff3cd;
            color: #856404;
        }

        .out-of-stock {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Product Inventory</h1>

        <div class="form-section">
            <h2 style="margin-bottom: 15px; color: #333; font-size: 18px;">Add New Product</h2>
            <div class="form-group">
                <label for="productName">Product Name *</label>
                <input type="text" id="productName" placeholder="Enter product name" required>
            </div>
            <div class="form-group">
                <label for="price">Price ($) *</label>
                <input type="number" id="price" placeholder="Enter price" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" placeholder="Enter quantity" min="0" required>
            </div>
            <button onclick="addProduct()">Add Product</button>
        </div>

        <div class="products-section">
            <h2 style="margin-bottom: 15px; color: #333; font-size: 18px;">Inventory</h2>
            <div id="productsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3003/products';

        // Load products on page load
        document.addEventListener('DOMContentLoaded', loadProducts);

        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                displayProducts(products);
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function displayProducts(products) {
            const productsList = document.getElementById('productsList');

            if (products.length === 0) {
                productsList.innerHTML = '<div class="empty-state">No products yet. Add one to get started!</div>';
                return;
            }

            const table = `
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map(product => `
                            <tr>
                                <td class="product-name">${product.name}</td>
                                <td class="price">$${product.price.toFixed(2)}</td>
                                <td>
                                    <input type="number" id="qty-${product._id}" value="${product.quantity}" min="0" class="quantity-input">
                                </td>
                                <td>
                                    ${product.quantity === 0 ? '<span class="out-of-stock">Out of Stock</span>' : 
                                      product.quantity < 10 ? '<span class="low-stock">Low Stock</span>' : 
                                      '<span style="color: #28a745;">In Stock</span>'}
                                </td>
                                <td>
                                    <button class="btn-update" onclick="updateQuantity('${product._id}')">Update</button>
                                    <button class="btn-delete" onclick="deleteProduct('${product._id}')">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            productsList.innerHTML = table;
        }

        async function addProduct() {
            const productName = document.getElementById('productName').value;
            const price = document.getElementById('price').value;
            const quantity = document.getElementById('quantity').value;

            if (!productName.trim() || !price || !quantity) {
                alert('Please fill in all required fields');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: productName,
                        price: parseFloat(price),
                        quantity: parseInt(quantity)
                    })
                });

                if (response.ok) {
                    document.getElementById('productName').value = '';
                    document.getElementById('price').value = '';
                    document.getElementById('quantity').value = '';
                    loadProducts();
                    alert('Product added successfully!');
                }
            } catch (error) {
                console.error('Error adding product:', error);
            }
        }

        async function updateQuantity(id) {
            const newQuantity = document.getElementById(`qty-${id}`).value;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        quantity: parseInt(newQuantity)
                    })
                });

                if (response.ok) {
                    loadProducts();
                    alert('Quantity updated successfully!');
                }
            } catch (error) {
                console.error('Error updating quantity:', error);
            }
        }

        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        loadProducts();
                    }
                } catch (error) {
                    console.error('Error deleting product:', error);
                }
            }
        }
    </script>
</body>
</html>
